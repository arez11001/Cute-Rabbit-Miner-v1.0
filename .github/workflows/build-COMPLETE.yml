name: Build Rabbit Miner V2 - Complete Firmware

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Cache PlatformIO
      uses: actions/cache@v4
      with:
        path: ~/.platformio
        key: ${{ runner.os }}-${{ hashFiles('**/lockfiles') }}
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade platformio
    
    - name: Build firmware
      run: pio run
    
    - name: Create complete firmware image
      run: |
        cd .pio/build/esp32-2432S028
        
        # Merge all components into complete 4MB flash image
        python ~/.platformio/packages/tool-esptoolpy/esptool.py \
          --chip esp32 merge_bin \
          -o RabbitMiner-V2-Complete.bin \
          --flash_mode dio \
          --flash_freq 40m \
          --flash_size 4MB \
          0x1000 bootloader.bin \
          0x8000 partitions.bin \
          0x10000 firmware.bin
        
        # Copy to project root
        cp RabbitMiner-V2-Complete.bin ../../../
        
        echo "Firmware size:"
        ls -lh ../../../RabbitMiner-V2-Complete.bin
    
    - name: Upload complete firmware
      uses: actions/upload-artifact@v4
      with:
        name: RabbitMiner-V2-Complete-Firmware
        path: RabbitMiner-V2-Complete.bin
        retention-days: 90
